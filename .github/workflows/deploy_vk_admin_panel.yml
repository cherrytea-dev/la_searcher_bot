name: Deploy-VK-Admin-Panel

on:
  push:
    branches: [main]
    paths:
      - "frontend/vk-admin-panel/**"
      - ".github/workflows/deploy_vk_admin_panel.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/vk-admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/vk-admin-panel

      - name: Build
        run: npm run build
        working-directory: frontend/vk-admin-panel

      - name: Configure AWS CLI (Yandex Object Storage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.YC_KEY_ID }}
          aws-secret-access-key: ${{ secrets.YC_KEY_SECRET }}

      - name: Sync to Object Storage
        run: |
          aws s3 sync ./dist s3://${{ vars.VK_ADMIN_PANEL_BUCKET }} \
            --endpoint-url https://storage.yandexcloud.net \
            --delete
        working-directory: frontend/vk-admin-panel
