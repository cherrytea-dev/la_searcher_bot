name: Deploy to Yandex Cloud Functions test_func

on:
  push:
    branches: [ deploy-yandex ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v3

      # # Создание zip архива
      # - name: Create zip archive
      #   run: zip -r test_func.zip src/test_func

      - name: goto to folder
        run: ls && cd ./src/test_func && ls

      # Деплой функции
      - name: Deploy to Yandex Cloud Function
        id: sls-func
        uses: yc-actions/yc-sls-function@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          bucket: ${{ secrets.YC_S3_BUCKET_NAME }}
          folder-id: ${{ secrets.YC_FOLDER_ID }}
          function-name: 'la-searcher-bot'
          runtime: 'python312'
          memory: '128Mb'
          entrypoint: 'src.test_func.main.handler'
          include: src/test_func

      # Вывод информации о развертывании
      - name: Show deployment info
        run: |
          echo "Function version: ${{ steps.sls-func.outputs.version }}"
          echo "Function status: ${{ steps.sls-func.outputs.status }}"
